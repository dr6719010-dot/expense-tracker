<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Vault — Expensive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

  :root{
    --vault:#0d1c14;
    --vault-2:#13261c;
    --vault-3:#0a1610;
    --parchment:#f1e6c9;
    --parchment-soft:#e9dbb5;
    --parchment-input:#e6d8af;
    --brass:#c9a449;
    --brass-light:#e6c878;
    --brass-dark:#7d5f24;
    --ink:#2a2014;
    --ink-soft:#6d5c3f;
    --wine:#6e2a37;
    --wine-light:#8a3b48;
    --sage:#3f5c43;
    --sage-light:#527a57;
    --glow: rgba(201,164,73,0.45);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  html,body{
    min-height:100vh;
    background: var(--vault);
    color: var(--parchment);
    font-family:'EB Garamond', serif;
  }

  body{
    background-image:
      radial-gradient(ellipse 900px 600px at 50% -10%, rgba(201,164,73,0.10), transparent 60%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 2px, transparent 2px, transparent 10px),
      linear-gradient(180deg, var(--vault) 0%, var(--vault-3) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 2.5rem 1.25rem 4rem;
    overflow-x:hidden;
  }

  .wrap{ width:100%; max-width: 460px; }

  /* ===== HEADER ===== */
  header{ display:flex; flex-direction:column; align-items:center; margin-bottom: 2rem; text-align:center; }

  .dial{
    width:54px; height:54px; margin-bottom: 0.9rem;
    filter: drop-shadow(0 0 10px rgba(201,164,73,0.25));
  }
  .dial-spin{
    animation: spin 90s linear infinite;
    transform-origin: 50% 50%;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size: 2.1rem;
    letter-spacing: 0.04em;
    color: var(--parchment);
    line-height:1;
  }
  h1 span{ color: var(--brass-light); font-style: italic; }

  .estd{
    font-family:'EB Garamond', serif;
    font-style: italic;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    color: var(--brass);
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  .conn{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.66rem;
    color: var(--ink-soft);
    margin-top: 0.5rem;
    letter-spacing: 0.03em;
  }

  /* ===== LEDGER CARD (corner-bracket styling) ===== */
  .ledger{
    position: relative;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.4), transparent 40%),
      var(--parchment);
    border-radius: 6px;
    padding: 1.9rem 1.7rem;
    margin-bottom: 1.4rem;
    box-shadow:
      0 18px 40px -12px rgba(0,0,0,0.55),
      0 0 0 1px rgba(201,164,73,0.25),
      inset 0 0 40px rgba(125,95,36,0.06);
    color: var(--ink);
  }

  .corner{ position:absolute; width:18px; height:18px; pointer-events:none; }
  .corner::before, .corner::after{ content:''; position:absolute; background: var(--brass-dark); }
  .corner.tl{ top:8px; left:8px; }
  .corner.tr{ top:8px; right:8px; transform: scaleX(-1); }
  .corner.bl{ bottom:8px; left:8px; transform: scaleY(-1); }
  .corner.br{ bottom:8px; right:8px; transform: scale(-1,-1); }
  .corner::before{ width:18px; height:2px; top:0; left:0; }
  .corner::after{ width:2px; height:18px; top:0; left:0; }

  /* ===== TABS ===== */
  .tabs{ display:flex; gap:0; margin-bottom: 1.5rem; border-bottom: 1.5px solid rgba(125,95,36,0.35); }
  .tab-btn{
    flex:1; padding: 0.6rem 0.5rem; background:none; border:none; cursor:pointer;
    font-family:'EB Garamond', serif; font-size: 0.92rem; letter-spacing:0.04em;
    color: var(--ink-soft); border-bottom: 2px solid transparent; transition: all 0.2s;
    text-transform: uppercase;
  }
  .tab-btn.active{ color: var(--ink); border-bottom-color: var(--brass-dark); font-weight:600; }

  /* ===== FIELDS ===== */
  .field{ margin-bottom: 1.1rem; }
  label{
    display:block; font-family:'EB Garamond', serif; font-style: italic;
    font-size: 0.78rem; letter-spacing: 0.04em; color: var(--ink-soft); margin-bottom: 0.4rem;
  }
  input[type="text"], input[type="number"], input[type="password"]{
    width:100%; padding: 0.65rem 0.8rem;
    border: 1.5px solid var(--brass-dark);
    border-radius: 3px;
    background: var(--parchment-input);
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.85rem; color: var(--ink);
    outline:none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus{ border-color: var(--brass); box-shadow: 0 0 0 3px var(--glow); }
  input::placeholder{ color: rgba(42,32,20,0.35); }

  .row{ display:grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }

  /* ===== BUTTONS ===== */
  .btn{
    width:100%; padding: 0.75rem; border: none; border-radius: 3px;
    font-family:'EB Garamond', serif; font-weight:600; font-size: 0.95rem;
    letter-spacing: 0.06em; text-transform: uppercase; cursor:pointer;
    transition: transform 0.1s, box-shadow 0.15s; position:relative; overflow:hidden;
  }
  .btn:active{ transform: scale(0.98); }
  .btn:disabled{ opacity:0.55; cursor:not-allowed; }

  .btn-brass{
    background: linear-gradient(180deg, var(--brass-light), var(--brass-dark));
    color: var(--ink); box-shadow: 0 4px 14px rgba(125,95,36,0.4);
  }
  .btn-sage{ background: linear-gradient(180deg, var(--sage-light), var(--sage)); color:#f1f5ee; box-shadow: 0 4px 14px rgba(63,92,67,0.4); }
  .btn-wine{ background: linear-gradient(180deg, var(--wine-light), var(--wine)); color:#f5e9ea; box-shadow: 0 4px 14px rgba(110,42,55,0.4); }

  /* ===== MESSAGE ===== */
  .msg{
    margin-top: 0.9rem; padding: 0.7rem 0.9rem; border-radius: 3px; font-size: 0.78rem;
    font-family:'IBM Plex Mono', monospace; display:none; border-left: 3px solid;
  }
  .msg.success{ background: rgba(63,92,67,0.1); border-color: var(--sage); color: var(--sage); display:block; }
  .msg.error{ background: rgba(110,42,55,0.1); border-color: var(--wine); color: var(--wine); display:block; }

  /* ===== DASHBOARD ===== */
  .hidden{ display:none !important; }

  .balance-card{ text-align:center; padding: 2rem 1.7rem; }
  .balance-label{
    font-family:'EB Garamond', serif; font-style: italic; font-size: 0.8rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 0.5rem;
  }
  .balance-amount{
    font-family:'IBM Plex Mono', monospace; font-size: 2.5rem; font-weight:600;
    color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.01em;
  }
  .balance-amount.negative{ color: var(--wine); }
  .balance-rule{ width: 70px; height: 1.5px; background: var(--brass-dark); margin: 0.7rem auto; }
  .welcome-name{ font-family:'EB Garamond', serif; font-style: italic; font-size: 0.85rem; color: var(--ink-soft); }

  .top-bar{ display:flex; justify-content: flex-end; margin-bottom: -0.4rem; }
  .logout-btn{
    font-family:'IBM Plex Mono', monospace; font-size: 0.66rem; color: var(--ink-soft);
    background:none; border:none; cursor:pointer; text-decoration: underline; letter-spacing:0.03em;
  }

  .action-tabs{ display:flex; gap: 8px; margin-bottom: 1.1rem; }
  .action-tab{
    flex:1; padding: 0.6rem; border-radius: 3px; border: 1.5px solid var(--brass-dark);
    background: transparent; cursor:pointer; font-family:'EB Garamond', serif; font-size: 0.85rem;
    font-weight:600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-soft);
    transition: all 0.18s;
  }
  .action-tab.active.dep{ background: var(--sage); border-color: var(--sage); color: #f1f5ee; }
  .action-tab.active.wd{ background: var(--wine); border-color: var(--wine); color: #f5e9ea; }

  /* ===== LEDGER ENTRIES ===== */
  .ledger-section h2{
    font-family:'EB Garamond', serif; font-style: italic; font-size: 0.8rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 0.85rem;
    border-bottom: 1px solid rgba(125,95,36,0.3); padding-bottom: 0.5rem;
  }
  .entry{
    display:flex; align-items:center; gap: 0.7rem; padding: 0.55rem 0;
    border-bottom: 1px dashed rgba(125,95,36,0.25); animation: entryIn 0.3s ease;
  }
  .entry:last-child{ border-bottom:none; }
  @keyframes entryIn{ from{ opacity:0; transform: translateY(-4px);} to{opacity:1; transform:translateY(0);} }

  .coin-mark{ width:22px; height:22px; flex-shrink:0; }

  .entry-info{ flex:1; display:flex; flex-direction:column; gap:1px; min-width:0; }
  .entry-cat{ font-family:'EB Garamond', serif; font-size: 0.88rem; color: var(--ink); font-weight:600; }
  .entry-desc{ font-family:'EB Garamond', serif; font-style: italic; font-size: 0.74rem; color: var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .entry-amt{ font-family:'IBM Plex Mono', monospace; font-size: 0.86rem; font-weight:600; flex-shrink:0; }
  .entry-amt.dep{ color: var(--sage); }
  .entry-amt.wd{ color: var(--wine); }

  .empty{ color: rgba(42,32,20,0.4); font-family:'EB Garamond', serif; font-style: italic; font-size: 0.85rem; text-align:center; padding: 1rem 0; }

  footer{
    margin-top: 0.8rem; text-align:center; font-family:'IBM Plex Mono', monospace;
    font-size: 0.66rem; color: var(--ink-soft); opacity:0.6;
  }
  footer a{ color: var(--brass-light); text-decoration:none; }

  /* ===== STAMP / COIN OVERLAY ===== */
  .stamp-overlay{
    position: fixed; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index: 999; opacity:0;
  }
  .stamp-overlay.show{ animation: overlayFade 1.05s ease forwards; }
  @keyframes overlayFade{
    0%{ opacity:0; } 8%{ opacity:1; } 78%{ opacity:1; } 100%{ opacity:0; }
  }

  .stamp-coin{
    width: 92px; height:92px;
    transform: translateY(-160px) rotateX(0deg) scale(0.7);
    opacity:0;
  }
  .stamp-overlay.show .stamp-coin.dep{ animation: coinDrop 1.05s cubic-bezier(.36,1.6,.4,1) forwards; }
  .stamp-overlay.show .stamp-coin.wd{ animation: coinDrop 1.05s cubic-bezier(.36,1.6,.4,1) forwards; }

  @keyframes coinDrop{
    0%{ transform: translateY(-160px) rotateY(0deg) scale(0.6); opacity:0; }
    10%{ opacity:1; }
    55%{ transform: translateY(0px) rotateY(720deg) scale(1.08); opacity:1; }
    66%{ transform: translateY(4px) rotateY(760deg) scale(0.96); }
    74%{ transform: translateY(0px) rotateY(780deg) scale(1.02); }
    100%{ transform: translateY(0px) rotateY(800deg) scale(1); opacity:1; }
  }

  .shock{
    position:absolute; width: 10px; height:10px; border-radius:50%;
    border: 2px solid var(--brass-light); opacity:0; top:50%; left:50%;
    transform: translate(-50%,-50%);
  }
  .stamp-overlay.show .shock{ animation: shockwave 0.6s ease-out 0.55s forwards; }
  @keyframes shockwave{
    0%{ width:10px; height:10px; opacity:0.9; border-color: var(--brass-light); }
    100%{ width:220px; height:220px; opacity:0; border-color: var(--brass-light); }
  }

  .stamp-label{
    position:absolute; top: calc(50% + 78px); left:50%; transform: translateX(-50%);
    font-family:'Cormorant Garamond', serif; font-weight:700; font-style: italic;
    font-size: 1.05rem; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;
    opacity:0; text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }
  .stamp-label.dep{ color: var(--sage-light); }
  .stamp-label.wd{ color: var(--wine-light); }
  .stamp-overlay.show .stamp-label{ animation: labelIn 0.5s ease 0.55s forwards; }
  @keyframes labelIn{ 0%{ opacity:0; transform: translateX(-50%) translateY(6px); } 100%{ opacity:1; transform: translateX(-50%) translateY(0); } }

  .balance-amount.tick{ animation: tickPulse 0.5s ease; }
  @keyframes tickPulse{ 0%{ transform: scale(1); } 35%{ transform: scale(1.07); } 100%{ transform: scale(1); } }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <svg class="dial" viewBox="0 0 100 100">
      <g class="dial-spin">
        <circle cx="50" cy="50" r="44" fill="none" stroke="#c9a449" stroke-width="1.5" opacity="0.55"/>
        <circle cx="50" cy="50" r="34" fill="none" stroke="#c9a449" stroke-width="1" opacity="0.35"/>
        <g stroke="#e6c878" stroke-width="2" opacity="0.8">
          <line x1="50" y1="6" x2="50" y2="14"/>
          <line x1="50" y1="86" x2="50" y2="94"/>
          <line x1="6" y1="50" x2="14" y2="50"/>
          <line x1="86" y1="50" x2="94" y2="50"/>
          <line x1="18" y1="18" x2="24" y2="24"/>
          <line x1="76" y1="76" x2="82" y2="82"/>
          <line x1="18" y1="82" x2="24" y2="76"/>
          <line x1="76" y1="24" x2="82" y2="18"/>
        </g>
        <circle cx="50" cy="50" r="4" fill="#e6c878"/>
      </g>
    </svg>
    <h1>The <span>Vault</span></h1>
    <p class="estd">Private Ledger &amp; Holdings</p>
    <p class="conn" id="conn-status">connecting...</p>
  </header>

  <!-- AUTH VIEW -->
  <div id="auth-view">
    <div class="ledger">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>

      <div class="tabs">
        <button class="tab-btn active" id="tab-login">Enter</button>
        <button class="tab-btn" id="tab-register">Open Account</button>
      </div>

      <div id="login-form">
        <div class="field"><label>Account Holder</label><input type="text" id="login-username" placeholder="dr4ven" /></div>
        <div class="field"><label>Passphrase</label><input type="password" id="login-password" placeholder="********" /></div>
        <button class="btn btn-brass" id="login-btn">Unlock Vault</button>
      </div>

      <div id="register-form" class="hidden">
        <div class="field"><label>Full Name</label><input type="text" id="reg-name" placeholder="DR4VEN" /></div>
        <div class="row">
          <div class="field"><label>Username</label><input type="text" id="reg-username" placeholder="dr4ven" /></div>
          <div class="field"><label>Age</label><input type="number" id="reg-age" placeholder="17" /></div>
        </div>
        <div class="field"><label>Passphrase</label><input type="password" id="reg-password" placeholder="********" /></div>
        <button class="btn btn-brass" id="register-btn">Open Account</button>
      </div>

      <div class="msg" id="auth-msg"></div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboard-view" class="hidden">
    <div class="ledger balance-card">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="top-bar"><button class="logout-btn" id="logout-btn">seal vault</button></div>
      <div class="balance-label">Holdings on Deposit</div>
      <div class="balance-amount" id="balance-amount">Rs 0.00</div>
      <div class="balance-rule"></div>
      <div class="welcome-name" id="welcome-name"></div>
    </div>

    <div class="ledger">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>

      <div class="action-tabs">
        <button class="action-tab active dep" id="action-income">Deposit</button>
        <button class="action-tab wd" id="action-expense">Withdraw</button>
      </div>

      <div class="field"><label>Amount</label><input type="number" id="txn-amount" placeholder="500" min="0" step="any" /></div>
      <div class="field"><label id="category-label">Source</label><input type="text" id="txn-category" placeholder="salary" /></div>
      <div class="field"><label>Memo (optional)</label><input type="text" id="txn-description" placeholder="monthly salary" /></div>

      <button class="btn btn-sage" id="txn-submit-btn">Stamp Deposit</button>
      <div class="msg" id="txn-msg"></div>
    </div>

    <div class="ledger">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="ledger-section">
        <h2>Recent Entries</h2>
        <div id="history-list"><div class="empty">the ledger is blank — make your first entry</div></div>
      </div>
    </div>
  </div>

  <footer>
    The Vault &middot; FastAPI + vanilla JS &middot; <a id="docs-link" href="#" target="_blank">api docs &rarr;</a>
  </footer>
</div>

<!-- STAMP OVERLAY -->
<div class="stamp-overlay" id="stamp-overlay">
  <div class="shock"></div>
  <svg class="stamp-coin" id="stamp-coin" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="coinGradDep" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#6f8f72"/>
        <stop offset="100%" stop-color="#324b35"/>
      </linearGradient>
      <linearGradient id="coinGradWd" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#9a4d59"/>
        <stop offset="100%" stop-color="#4f1d27"/>
      </linearGradient>
    </defs>
    <circle cx="50" cy="50" r="46" fill="url(#coinGradDep)" id="coin-face" stroke="#e6c878" stroke-width="3"/>
    <circle cx="50" cy="50" r="36" fill="none" stroke="#e6c878" stroke-width="1.5" opacity="0.7"/>
    <text x="50" y="62" font-family="Cormorant Garamond, serif" font-size="38" font-weight="700" fill="#f1e6c9" text-anchor="middle" id="coin-symbol">+</text>
  </svg>
  <div class="stamp-label dep" id="stamp-label">Deposited</div>
</div>

<script>
  // ⚠️ CHANGE THIS to your deployed backend URL
  const API = 'http://127.0.0.1:8000';

  document.getElementById('docs-link').href = `${API}/docs`;
  document.getElementById('conn-status').textContent = `${API.replace('https://','').replace('http://','')} — sealed connection`;

  let currentUser = null;
  let txnType = 'income';

  // ---------- AUTH TABS ----------
  document.getElementById('tab-login').addEventListener('click', () => switchAuthTab('login'));
  document.getElementById('tab-register').addEventListener('click', () => switchAuthTab('register'));

  function switchAuthTab(tab){
    document.getElementById('tab-login').classList.toggle('active', tab==='login');
    document.getElementById('tab-register').classList.toggle('active', tab==='register');
    document.getElementById('login-form').classList.toggle('hidden', tab!=='login');
    document.getElementById('register-form').classList.toggle('hidden', tab!=='register');
    hideMsg('auth-msg');
  }

  // ---------- REGISTER ----------
  document.getElementById('register-btn').addEventListener('click', async () => {
    const name = document.getElementById('reg-name').value.trim();
    const username = document.getElementById('reg-username').value.trim();
    const age = parseInt(document.getElementById('reg-age').value);
    const password = document.getElementById('reg-password').value;

    if(!name || !username || !password || !age){ showMsg('auth-msg','every field of the ledger must be filled','error'); return; }

    try{
      const res = await fetch(`${API}/register`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, password, name, age })
      });
      const data = await res.json();
      if(!res.ok){ showMsg('auth-msg', data.detail || 'the account could not be opened', 'error'); return; }
      showMsg('auth-msg', 'account opened — enter your passphrase to unlock the vault', 'success');
      switchAuthTab('login');
      document.getElementById('login-username').value = username;
    }catch(err){ showMsg('auth-msg','cannot reach the vault — is the server running?','error'); }
  });

  // ---------- LOGIN ----------
  document.getElementById('login-btn').addEventListener('click', async () => {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if(!username || !password){ showMsg('auth-msg','account holder and passphrase required','error'); return; }

    try{
      const res = await fetch(`${API}/login`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if(!res.ok){ showMsg('auth-msg', data.detail || 'the vault remains sealed', 'error'); return; }
      currentUser = data.user;
      enterDashboard();
    }catch(err){ showMsg('auth-msg','cannot reach the vault — is the server running?','error'); }
  });

  // ---------- LOGOUT ----------
  document.getElementById('logout-btn').addEventListener('click', () => {
    currentUser = null;
    document.getElementById('dashboard-view').classList.add('hidden');
    document.getElementById('auth-view').classList.remove('hidden');
    document.getElementById('login-password').value = '';
  });

  // ---------- DASHBOARD ----------
  function enterDashboard(){
    document.getElementById('auth-view').classList.add('hidden');
    document.getElementById('dashboard-view').classList.remove('hidden');
    document.getElementById('welcome-name').textContent = `held in trust for ${currentUser.name}`;
    refreshBalance();
  }

  async function refreshBalance(animate){
    try{
      const res = await fetch(`${API}/balance/${currentUser.user_id}`);
      const data = await res.json();
      const el = document.getElementById('balance-amount');
      el.textContent = `Rs ${Number(data.balance).toFixed(2)}`;
      el.classList.toggle('negative', data.balance < 0);
      if(animate){ el.classList.remove('tick'); requestAnimationFrame(()=> el.classList.add('tick')); }
    }catch(err){ console.error('failed to fetch balance'); }
  }

  // ---------- INCOME / EXPENSE TOGGLE ----------
  document.getElementById('action-income').addEventListener('click', () => setTxnType('income'));
  document.getElementById('action-expense').addEventListener('click', () => setTxnType('expense'));

  function setTxnType(type){
    txnType = type;
    document.getElementById('action-income').classList.toggle('active', type==='income');
    document.getElementById('action-expense').classList.toggle('active', type==='expense');
    document.getElementById('category-label').textContent = type==='income' ? 'Source' : 'Category';
    document.getElementById('txn-category').placeholder = type==='income' ? 'salary' : 'food';

    const btn = document.getElementById('txn-submit-btn');
    btn.textContent = type==='income' ? 'Stamp Deposit' : 'Stamp Withdrawal';
    btn.className = `btn ${type==='income' ? 'btn-sage' : 'btn-wine'}`;
  }

  // ---------- ADD TRANSACTION ----------
  document.getElementById('txn-submit-btn').addEventListener('click', async () => {
    const amount = parseFloat(document.getElementById('txn-amount').value);
    const category = document.getElementById('txn-category').value.trim();
    const description = document.getElementById('txn-description').value.trim();
    const btn = document.getElementById('txn-submit-btn');

    if(!amount || amount <= 0 || !category){ showMsg('txn-msg','enter a valid amount and category','error'); return; }

    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'Stamping...';

    const endpoint = txnType === 'income' ? '/income' : '/expense';
    const body = txnType === 'income'
      ? { user_id: currentUser.user_id, amount, source: category, description }
      : { user_id: currentUser.user_id, amount, category, description };

    try{
      const res = await fetch(`${API}${endpoint}`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const data = await res.json();
      if(!res.ok){ showMsg('txn-msg', data.detail || 'the entry was refused', 'error'); return; }

      showMsg('txn-msg', data.message || 'entry recorded in the ledger', 'success');
      document.getElementById('txn-amount').value='';
      document.getElementById('txn-category').value='';
      document.getElementById('txn-description').value='';

      playStamp(txnType);
      addToHistory(category, amount, txnType, description);
      setTimeout(()=> refreshBalance(true), 550);
    }catch(err){
      showMsg('txn-msg','cannot reach the vault','error');
    }finally{
      btn.disabled = false;
      btn.textContent = originalText;
    }
  });

  // ---------- STAMP ANIMATION ----------
  function playStamp(type){
    const overlay = document.getElementById('stamp-overlay');
    const coin = document.getElementById('stamp-coin');
    const face = document.getElementById('coin-face');
    const symbol = document.getElementById('coin-symbol');
    const label = document.getElementById('stamp-label');

    coin.classList.remove('dep','wd');
    label.classList.remove('dep','wd');
    overlay.classList.remove('show');

    if(type === 'income'){
      face.setAttribute('fill','url(#coinGradDep)');
      symbol.textContent = '+';
      coin.classList.add('dep');
      label.classList.add('dep');
      label.textContent = 'Deposited';
    } else {
      face.setAttribute('fill','url(#coinGradWd)');
      symbol.textContent = '\u2212';
      coin.classList.add('wd');
      label.classList.add('wd');
      label.textContent = 'Withdrawn';
    }

    requestAnimationFrame(() => {
      requestAnimationFrame(() => overlay.classList.add('show'));
    });
    setTimeout(() => overlay.classList.remove('show'), 1150);
  }

  // ---------- HISTORY (session only) ----------
  const history = [];
  function addToHistory(category, amount, type, description){
    history.unshift({ category, amount, type, description });
    if(history.length > 8) history.pop();
    renderHistory();
  }

  function coinIcon(type){
    const color = type === 'income' ? '#3f5c43' : '#6e2a37';
    const sign = type === 'income' ? '+' : '\u2212';
    return `<svg class="coin-mark" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="${color}" stroke="#c9a449" stroke-width="1"/><text x="12" y="16" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="600" fill="#f1e6c9" text-anchor="middle">${sign}</text></svg>`;
  }

  function renderHistory(){
    const list = document.getElementById('history-list');
    if(history.length === 0){ list.innerHTML = '<div class="empty">the ledger is blank — make your first entry</div>'; return; }
    list.innerHTML = history.map(h => `
      <div class="entry">
        ${coinIcon(h.type)}
        <div class="entry-info">
          <span class="entry-cat">${h.category}</span>
          ${h.description ? `<span class="entry-desc">${h.description}</span>` : ''}
        </div>
        <span class="entry-amt ${h.type === 'income' ? 'dep' : 'wd'}">${h.type === 'income' ? '+' : '\u2212'}Rs ${Number(h.amount).toFixed(2)}</span>
      </div>
    `).join('');
  }

  // ---------- HELPERS ----------
  function showMsg(id, text, type){ const el = document.getElementById(id); el.textContent = text; el.className = `msg ${type}`; }
  function hideMsg(id){ const el = document.getElementById(id); el.className = 'msg'; el.textContent=''; }

  document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-btn').click(); });
  document.getElementById('reg-password').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('register-btn').click(); });
  document.getElementById('txn-description').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('txn-submit-btn').click(); });
</script>
</body>
</html>
